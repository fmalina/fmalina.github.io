<!DOCTYPE html>
<html lang="en-gb">
<head>
<meta charset="utf-8">
<title>pay by PayPal</title>
<meta name="author" content="F. Malina [fmalina@gmail.com]">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="canonical" href="https://fmalina.github.io/pay.html">
<link rel="stylesheet" href="https://fmalina.github.io/style.css">
<style>
form,header h2{margin:0 auto;max-width:500px}
form{padding:.5em;margin-bottom:1em;text-align:center;
    font-family:"Helvetica Neue", Arial, sans-serif;color:#444}
fieldset{border:1px solid #ccc;border-bottom-width:2px;border-radius:5px}
.clear{clear:both}
legend{position:relative;}
legend img{padding:0 .5em;background:#fff}
main{text-align:center}
#product_msg{font-size:1.5em}
#prefilled_amount{font-size:1.2em;color:green;padding-top:.5em;}
#os1{padding:8px;border-radius:.5em;border:1px solid #ddd}
</style>
<script>
function getQueryVariable(variable){
	var query = window.location.search.substring(1);
	var vars = query.split("&");
	for (var i=0;i<vars.length;i++) {
		var pair = vars[i].split("=");
		if(pair[0] == variable){return pair[1];}
	}
	return(false);
}
function prefillAmount(){
	var amount = parseInt(getQueryVariable("amount"), 10);
	if (amount) {
	document.forms[0].amount.value = amount;
	document.forms[0].amountEntered.value = amount;
	document.getElementById('input_amount_2').checked = false;
	document.getElementById('currency_amount_selector').style.display = "none";
	document.getElementById('prefilled_amount').innerHTML = "£"+amount;
	document.getElementById('submit_button').innerHTML = "Purchase";
	document.getElementById('cmd_donation').value = "_xclick";
	}
	var msg = getQueryVariable("msg").replace(/_/g, ' ');
	if (msg) {
	document.forms[0].os1.value = msg;
	document.getElementById('product_msg').innerHTML = msg;
	}
}
</script>
</head>
<body onload="prefillAmount()">
<main>
<form action="https://www.paypal.com/cgi-bin/webscr" method="post">
<fieldset>
<legend>
<img src="https://www.paypalobjects.com/webstatic/mktg/Logo/pp-logo-100px.png" alt="PayPal">
</legend>
<div id="product_msg"></div>
<div id="prefilled_amount"></div>

<p id="currency_amount_selector">
<label id="amount_label">Choose currency and amount.</label><br>
<select name="currency_code" id="input_currency_code" size="1">
<option value="GBP">GBP - £</option>
<option value="">- - - </option>
<option value="USD">USD - $</option>
<option value="GBP">GBP - £</option>
<option value="EUR">EUR - €</option>
<option value="AUD">AUD - $</option>
<option value="CAD">CAD - $</option>
<option value="CHF">CHF</option>
<option value="CZK">CZK - Kč</option>
<option value="DKK">DKK - kr</option>
<option value="HKD">HKD - HK$</option>
<option value="HUF">HUF - Ft</option>
<option value="JPY">JPY - ¥</option>
<option value="NZD">NZD - NZ$</option>
<option value="NOK">NOK - kr</option>
<option value="PLN">PLN - zł</option>
<option value="SGD">SGD - S$</option>
<option value="SEK">SEK - kr</option>
<option value="ILS">ILS - ₪</option>
</select>

<input type="hidden" name="amount" value="50"><!-- default is 50 -->
<input type="radio" name="amountOption" id="input_amount_1" onclick="this.form.amount.value=10;" value="10">
<label id="amount_1">10</label>  
<input type="radio" name="amountOption" id="input_amount_1" onclick="this.form.amount.value=25;" value="25">
<label id="amount_1">25</label> 
<input type="radio" name="amountOption" id="input_amount_2" onclick="this.form.amount.value=50;" value="50" checked="checked">
<label id="amount_2">50</label> 
<input type="radio" name="amountOption" id="input_amount_3" onclick="this.form.amount.value=100;" value="100">
<label id="amount_3">100</label> 
<input type="radio" name="amountOption" id="input_amount_other" value="Other">
<label id="amount_other"><input type="text" placeholder="enter any amount" name="amountEntered" id="amountGiven" size="15" onfocus="this.form.input_amount_other.checked=true;" onchange="this.form.amount.value=this.form.amountEntered.value;"></label>
<input type="hidden" name="cmd" value="_donations" id="cmd_donation"> 
<input type="hidden" name="business" value="fmalina@gmail.com"> 
<input type="hidden" name="item_name" value="to F. Malina"> 
<input type="hidden" name="bn" value="PP-DonationsBF:btn_donate_LG.gif:NonHosted">
<input type="hidden" name="no_shipping" value="1"> 
<input type="hidden" name="no_note" value="0"> 
<input type="hidden" name="tax" value="0"> 
</p>
<p>
<label for="os1">
	Add your message for <a href="https://fmalina.github.io">F. Malina</a>
	(max. 200 characters)</label><br>
<input type="hidden" name="on1" value="Message"> 
<input type="text" name="os1" id="os1" size="45">

<button type="submit" id="submit_button" class="btn">Send</button>
</fieldset>
</form>

</main>
</body>
</html>
